<body>

  <!-- Your React code -->
  <!-- Replace the code inside this script with your React component -->
  <script type="text/javascript">
    // Example: Your React component code here
    const { useState, useEffect } = React;

    function App() {
      // Your existing React code (map component) here
      return React.createElement('div', null, 'Hello, React!');
    }

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>
